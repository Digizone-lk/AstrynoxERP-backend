name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite:///./test_billflow.db
      SECRET_KEY: ci-only-secret-key-not-used-in-production
      ENVIRONMENT: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -q --tb=short
